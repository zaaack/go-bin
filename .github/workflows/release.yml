name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o go-bin${{ matrix.suffix }} ./cmd/go-bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: go-bin${{ matrix.suffix }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Package
        run: |
          cd artifacts
          tar czf ../go-bin-linux-amd64.tar.gz go-bin-linux-amd64
          tar czf ../go-bin-linux-arm64.tar.gz go-bin-linux-arm64
          tar czf ../go-bin-darwin-amd64.tar.gz go-bin-darwin-amd64
          tar czf ../go-bin-darwin-arm64.tar.gz go-bin-darwin-arm64
          zip -r ../go-bin-windows-amd64.zip go-bin-windows-amd64/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            go-bin-linux-amd64.tar.gz
            go-bin-linux-arm64.tar.gz
            go-bin-darwin-amd64.tar.gz
            go-bin-darwin-arm64.tar.gz
            go-bin-windows-amd64.zip
