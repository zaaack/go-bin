<!doctype html>
<html lang="{{.HTMLLang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{t .Lang "new.pageTitle"}}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="/">Go Share</a>
      <nav>
        <a class="nav-link" href="/">{{t .Lang "nav.list"}}</a>
        <a class="nav-link nav-cta" href="/new">{{t .Lang "nav.new"}}</a>
      </nav>
    </div>
  </header>
  <main class="container page">
    <section class="hero compact">
      <div>
        <h1>{{t .Lang "new.title"}}</h1>
        <p>{{t .Lang "new.description"}}</p>
      </div>
    </section>

    <section class="forms">
      <form class="panel compose-panel" action="/shares" method="post" enctype="multipart/form-data" data-compose-form data-single-file="{{if .Cfg.SingleFile}}true{{else}}false{{end}}">
        <h2>{{t .Lang "new.compose.title"}}</h2>
        <p class="compose-hint">{{if .Cfg.SingleFile}}{{t .Lang "new.compose.hint.single"}}{{else}}{{t .Lang "new.compose.hint.multi"}}{{end}}</p>
        <input type="hidden" name="kind" value="text" data-compose-kind>
        <input type="hidden" name="text" value="" data-compose-text>
        <input type="hidden" name="link" value="" data-compose-link>
        <input type="hidden" name="is_public" value="{{if .Defaults.DefaultPublic}}1{{else}}0{{end}}" data-compose-public-hidden>
        <input type="hidden" name="is_pinned" value="{{if .Defaults.DefaultPin}}1{{else}}0{{end}}">
        <input type="hidden" name="expire" value="{{.Defaults.DefaultExpire}}" data-compose-expire-hidden>

        <label class="compose-label" for="compose-textarea">
          {{t .Lang "new.compose.label"}}
          <textarea id="compose-textarea" name="compose" rows="10" placeholder="{{t .Lang "new.compose.placeholder"}}" data-compose-textarea></textarea>
        </label>

        <div class="compose-toolbar">
          <input id="compose-file" type="file" name="files" hidden data-compose-file multiple>
          <button class="button ghost" type="button" data-compose-picker>{{t .Lang "new.compose.pick"}}</button>
          <button class="button primary" type="submit" data-compose-submit>{{t .Lang "new.compose.upload"}}</button>
        </div>

        <div class="file-list" data-compose-file-list></div>

        <div class="compose-options">
          <label class="option-inline option-public" for="compose-public">
            <span>{{t .Lang "new.compose.public"}}</span>
            <input id="compose-public" type="checkbox" value="1" {{if .Defaults.DefaultPublic}}checked{{end}} data-compose-public>
          </label>
          <label class="option-inline option-expire">
            <span>{{t .Lang "new.compose.expire"}}</span>
            <select data-compose-expire>
              <option value="never" {{if isDefaultExpire .Defaults.DefaultExpire "never"}}selected{{end}}>{{t .Lang "share.expire.never"}}</option>
              <option value="1d" {{if isDefaultExpire .Defaults.DefaultExpire "1d"}}selected{{end}}>1d</option>
              <option value="7d" {{if isDefaultExpire .Defaults.DefaultExpire "7d"}}selected{{end}}>7d</option>
              <option value="30d" {{if isDefaultExpire .Defaults.DefaultExpire "30d"}}selected{{end}}>30d</option>
              <option value="1mo" {{if isDefaultExpire .Defaults.DefaultExpire "1mo"}}selected{{end}}>1mo</option>
              <option value="3mo" {{if isDefaultExpire .Defaults.DefaultExpire "3mo"}}selected{{end}}>3mo</option>
              <option value="1y" {{if isDefaultExpire .Defaults.DefaultExpire "1y"}}selected{{end}}>1y</option>
            </select>
          </label>
        </div>

        <p class="compose-status" data-compose-status></p>
      </form>
    </section>
  </main>
  <script>window.GO_SHARE_LANG = {{printf "%q" .Lang}}</script>
  <script src="/static/app.js"></script>
</body>
</html>
