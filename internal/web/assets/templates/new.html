<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新建分享</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="/">Go Share</a>
      <nav>
        <a class="nav-link" href="/">列表</a>
        <a class="nav-link nav-cta" href="/new">发布</a>
      </nav>
    </div>
  </header>
  <main class="container page">
    <section class="hero compact">
      <div>
        <h1>新建分享</h1>
        <p>默认公开、置顶和过期时间来自启动参数。</p>
      </div>
    </section>

    <section class="forms">
      <form class="panel" action="/shares" method="post" enctype="multipart/form-data">
        <h2>分享文件</h2>
        <input type="hidden" name="kind" value="file">
        <label>标题 <input name="title" placeholder="可选，默认使用原文件名"></label>
        <label>文件 <input type="file" name="file" required></label>
        <div class="grid-3">
          <label>公开 <input type="checkbox" name="is_public" value="1" {{if .Defaults.DefaultPublic}}checked{{end}}></label>
          <label>置顶 <input type="checkbox" name="is_pinned" value="1" {{if .Defaults.DefaultPin}}checked{{end}}></label>
          <label>过期时间
            <select name="expire">
              <option value="never" {{if isDefaultExpire .Defaults.DefaultExpire "never"}}selected{{end}}>永不过期</option>
              <option value="1d" {{if isDefaultExpire .Defaults.DefaultExpire "1d"}}selected{{end}}>1 天</option>
              <option value="7d" {{if isDefaultExpire .Defaults.DefaultExpire "7d"}}selected{{end}}>7 天</option>
              <option value="30d" {{if isDefaultExpire .Defaults.DefaultExpire "30d"}}selected{{end}}>30 天</option>
              <option value="1mo" {{if isDefaultExpire .Defaults.DefaultExpire "1mo"}}selected{{end}}>1 个月</option>
              <option value="3mo" {{if isDefaultExpire .Defaults.DefaultExpire "3mo"}}selected{{end}}>3 个月</option>
              <option value="1y" {{if isDefaultExpire .Defaults.DefaultExpire "1y"}}selected{{end}}>1 年</option>
            </select>
          </label>
        </div>
        <button class="button primary" type="submit">发布文件</button>
      </form>

      <form class="panel" action="/shares" method="post">
        <h2>分享文本</h2>
        <input type="hidden" name="kind" value="text">
        <label>标题 <input name="title" placeholder="可选"></label>
        <label>文本 <textarea name="text" rows="8" placeholder="输入要分享的内容" required></textarea></label>
        <div class="grid-3">
          <label>公开 <input type="checkbox" name="is_public" value="1" {{if .Defaults.DefaultPublic}}checked{{end}}></label>
          <label>置顶 <input type="checkbox" name="is_pinned" value="1" {{if .Defaults.DefaultPin}}checked{{end}}></label>
          <label>过期时间
            <select name="expire">
              <option value="never" {{if isDefaultExpire .Defaults.DefaultExpire "never"}}selected{{end}}>永不过期</option>
              <option value="1d" {{if isDefaultExpire .Defaults.DefaultExpire "1d"}}selected{{end}}>1 天</option>
              <option value="7d" {{if isDefaultExpire .Defaults.DefaultExpire "7d"}}selected{{end}}>7 天</option>
              <option value="30d" {{if isDefaultExpire .Defaults.DefaultExpire "30d"}}selected{{end}}>30 天</option>
              <option value="1mo" {{if isDefaultExpire .Defaults.DefaultExpire "1mo"}}selected{{end}}>1 个月</option>
              <option value="3mo" {{if isDefaultExpire .Defaults.DefaultExpire "3mo"}}selected{{end}}>3 个月</option>
              <option value="1y" {{if isDefaultExpire .Defaults.DefaultExpire "1y"}}selected{{end}}>1 年</option>
            </select>
          </label>
        </div>
        <button class="button primary" type="submit">发布文本</button>
      </form>

      <form class="panel" action="/shares" method="post">
        <h2>分享链接</h2>
        <input type="hidden" name="kind" value="link">
        <label>标题 <input name="title" placeholder="可选"></label>
        <label>URL <input name="link" placeholder="https://example.com" required></label>
        <div class="grid-3">
          <label>公开 <input type="checkbox" name="is_public" value="1" {{if .Defaults.DefaultPublic}}checked{{end}}></label>
          <label>置顶 <input type="checkbox" name="is_pinned" value="1" {{if .Defaults.DefaultPin}}checked{{end}}></label>
          <label>过期时间
            <select name="expire">
              <option value="never" {{if isDefaultExpire .Defaults.DefaultExpire "never"}}selected{{end}}>永不过期</option>
              <option value="1d" {{if isDefaultExpire .Defaults.DefaultExpire "1d"}}selected{{end}}>1 天</option>
              <option value="7d" {{if isDefaultExpire .Defaults.DefaultExpire "7d"}}selected{{end}}>7 天</option>
              <option value="30d" {{if isDefaultExpire .Defaults.DefaultExpire "30d"}}selected{{end}}>30 天</option>
              <option value="1mo" {{if isDefaultExpire .Defaults.DefaultExpire "1mo"}}selected{{end}}>1 个月</option>
              <option value="3mo" {{if isDefaultExpire .Defaults.DefaultExpire "3mo"}}selected{{end}}>3 个月</option>
              <option value="1y" {{if isDefaultExpire .Defaults.DefaultExpire "1y"}}selected{{end}}>1 年</option>
            </select>
          </label>
        </div>
        <button class="button primary" type="submit">发布链接</button>
      </form>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
