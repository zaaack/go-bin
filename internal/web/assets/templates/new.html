<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新建分享</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="/">Go Share</a>
      <nav>
        <a class="nav-link" href="/">列表</a>
        <a class="nav-link nav-cta" href="/new">发布</a>
      </nav>
    </div>
  </header>
  <main class="container page">
    <section class="hero compact">
      <div>
        <h1>新建分享</h1>
        <p>默认公开、置顶和过期时间来自启动参数。</p>
      </div>
    </section>

    <section class="forms">
      <form class="panel compose-panel" action="/shares" method="post" enctype="multipart/form-data" data-compose-form>
        <h2>发布内容</h2>
        <p class="compose-hint">输入文本，或把文件拖拽、粘贴到文本框中。文本 `trim` 后如果只剩一个 URL，会自动按链接分享。</p>
        <input type="hidden" name="kind" value="text" data-compose-kind>
        <input type="hidden" name="text" value="" data-compose-text>
        <input type="hidden" name="link" value="" data-compose-link>
        <input type="hidden" name="is_public" value="{{if .Defaults.DefaultPublic}}1{{else}}0{{end}}" data-compose-public-hidden>
        <input type="hidden" name="is_pinned" value="{{if .Defaults.DefaultPin}}1{{else}}0{{end}}">
        <input type="hidden" name="expire" value="{{.Defaults.DefaultExpire}}" data-compose-expire-hidden>

        <label class="compose-label" for="compose-textarea">
          内容
          <textarea id="compose-textarea" name="compose" rows="10" placeholder="输入文本，或拖拽 / 粘贴文件到这里" data-compose-textarea></textarea>
        </label>

        <div class="compose-toolbar">
          <input id="compose-file" type="file" name="file" hidden data-compose-file>
          <button class="button ghost" type="button" data-compose-picker>选择文件</button>
          <button class="button primary" type="submit" data-compose-submit>上传</button>
        </div>

        <div class="compose-options">
          <label class="option-inline option-public" for="compose-public">
            <span>Public</span>
            <input id="compose-public" type="checkbox" value="1" {{if .Defaults.DefaultPublic}}checked{{end}} data-compose-public>
          </label>
          <label class="option-inline option-expire">
            <span>过期时间</span>
            <select data-compose-expire>
              <option value="never" {{if isDefaultExpire .Defaults.DefaultExpire "never"}}selected{{end}}>永不过期</option>
              <option value="1d" {{if isDefaultExpire .Defaults.DefaultExpire "1d"}}selected{{end}}>1 天</option>
              <option value="7d" {{if isDefaultExpire .Defaults.DefaultExpire "7d"}}selected{{end}}>7 天</option>
              <option value="30d" {{if isDefaultExpire .Defaults.DefaultExpire "30d"}}selected{{end}}>30 天</option>
              <option value="1mo" {{if isDefaultExpire .Defaults.DefaultExpire "1mo"}}selected{{end}}>1 个月</option>
              <option value="3mo" {{if isDefaultExpire .Defaults.DefaultExpire "3mo"}}selected{{end}}>3 个月</option>
              <option value="1y" {{if isDefaultExpire .Defaults.DefaultExpire "1y"}}selected{{end}}>1 年</option>
            </select>
          </label>
        </div>

        <p class="compose-status" data-compose-status>当前将分享文本</p>
      </form>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
